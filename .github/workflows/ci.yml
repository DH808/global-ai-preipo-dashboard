name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test
      - run: npm run check
      - run: node -e "const fs=require('fs'); JSON.parse(fs.readFileSync('data/state.json','utf8')); console.log('state.json ok')"
